version: '3.8'

services:
  # Database
  db:
    image: postgres:16-alpine
    env_file:
      - ./server/.env
    environment:
      # Those variables Postgres will take from your .env file
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data # To prevent data from being deleted when restarting

  # Backend
  backend:
    build: 
      context: ./server
    ports:
      - "5001:5000"
      - "5555:5555"
    volumes:
      - ./server:/app
      - /app/node_modules
    command: npx nodemon src/server.js
    env_file:
      - ./server/.env
    depends_on:
      - db # Waiting for the database to start

  # Frontend
  frontend:
    build: 
      context: ./client
    ports:
      - "5174:5173"
    volumes:
      - ./client:/app
      - /app/node_modules
    environment:
      - VITE_API_URL=http://localhost:5001 
    depends_on:
      - backend # Waiting for the backend to start

  # Redis for caching
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data: